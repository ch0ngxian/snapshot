name: snapshot
description: "Mobile multiplayer photo-tag game"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase (per tech-plan.md §5.4 — region asia-southeast1)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0          # anonymous auth (§2 onboarding)
  cloud_firestore: ^5.4.0        # users/{uid} profile + future lobby state
  firebase_storage: ^12.3.0      # selfie thumbs + borderline tag photos (§5.9)
  cloud_functions: ^5.1.0        # createLobby / joinLobby callables (§5.4)
  firebase_messaging: ^15.1.0    # FCM tag-push delivery (§5.4 / submitTag victim push)

  # Lobby flow (per tech-plan §5.3)
  qr_flutter: ^4.1.0                     # render the join QR (host waiting room)
  mobile_scanner: ^7.2.0                 # scan the join QR (joiner flow); 7.x pulls GoogleMLKit 9.x, matching google_mlkit_face_detection

  # Face pipeline (per tech-plan.md §5.7)
  google_mlkit_face_detection: ^0.13.0  # detect & crop largest face
  tflite_flutter: ^0.11.0                # MobileFaceNet inference
  image: ^4.1.0                          # crop / resize / decode

  # Onboarding (per tech-plan.md §2)
  image_picker: ^1.1.0                   # selfie capture via system camera

  # Resume-on-relaunch (auto-rejoin into the active lobby/round)
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/  # MobileFaceNet TFLite (sourced via tools/fetch_model.sh)
