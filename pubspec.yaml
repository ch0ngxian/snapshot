name: snapshot
description: "Mobile multiplayer photo-tag game"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Face pipeline (per tech-plan.md §5.7)
  google_mlkit_face_detection: ^0.13.0  # detect & crop largest face
  tflite_flutter: ^0.11.0                # MobileFaceNet inference
  image: ^4.1.0                          # crop / resize / decode

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/  # MobileFaceNet TFLite (sourced via tools/fetch_model.sh)
